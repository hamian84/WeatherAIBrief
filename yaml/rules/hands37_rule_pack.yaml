rules:
- rule_id: east_asia_topography_adjustment
  section_no: 1
  category: synoptic_basics
  rule_type: operational
  title: 고지대 지형을 고려한 저층 일기도 보정
  source_ref: hands_37.pdf p.4-5
  applicable_domains:
  - 850hPa
  - 925hPa
  - surface
  - sfc12h_synoptic
  feature_mapping_status: partial
  trigger_conditions:
    any_of:
    - - 850hPa:surface_below_ground_risk_area
    - - 925hPa:surface_below_ground_risk_area
  interpretation: 티베트고원과 몽골고원 같은 고지대는 저층 일기도에서 지면 아래 영역이 포함될 수 있으므로 기압·바람을 기계적으로 따라가면 안 된다.
  forecast_use: 고지대 인접 구역의 저층 신호는 연속성, 기후 배경, 상층 구조와 함께 보정 해석한다.
  prohibited_use:
  - 고지대 저층 기압값만으로 폐쇄 저기압이나 전선을 단정하지 않는다.
- rule_id: spring_heat_low_vs_frontal_low
  section_no: 1
  category: synoptic_basics
  rule_type: operational
  title: 봄철 열저기압과 전선저기압 구분
  source_ref: hands_37.pdf p.7-8
  applicable_domains:
  - 300hPa
  - 500hPa
  - 850hPa
  - surface
  feature_mapping_status: mapped
  trigger_conditions:
    any_of:
    - - 850hPa:warm_advection
      - surface:low_center
    - - 500hPa:trough_axis
      - 850hPa:warm_advection
      - surface:low_center
  interpretation: 봄철 지표가열로 생긴 열저기압은 정체성 저기압이며, 상층 한기와 기압골이 결합할 때만 연직 발달한 전선저기압으로 전환될 수 있다.
  forecast_use: 상층 한기·기압골 동반 여부가 없으면 열저기압을 전선저기압으로 과대해석하지 않는다.
  prohibited_use:
  - 상층 온도골과 기압골 확인 없이 전선 분석을 붙이지 않는다.
- rule_id: philippines_high_moist_inflow

  trigger_conditions:
    any_of:
    - - 850hPa:low_level_jet
      - surface:front
      - satellite_wv:band_cloud
    - - 850hPa:moisture_transport_axis
      - surface:wet_area
      - 300hPa:jet_axis
  interpretation: 하층 남서류, 정체전선성 경계, 상층 배경장이 결합하면 장마전선 유사 구조로 볼 수 있다.
  forecast_use: 광범위 강수와 지속성 여부를 함께 점검한다.
- rule_id: changma_vertical_shear_support
  section_no: 15
  category: seasonal_front
  rule_type: reference
  title: 장마 환경의 연직시어 강화
  source_ref: hands_37.pdf p.114-118
  applicable_domains:
  - 300hPa
  - 850hPa
  feature_mapping_status: partial
  trigger_conditions:
    any_of:
    - - 300hPa:jet_axis
      - 850hPa:low_level_jet
  interpretation: 장마전선 환경에서는 큰 연직 바람시어가 대류 강화를 돕는다.
  forecast_use: 장마성 강수는 단순 습윤역보다 시어 구조를 함께 본다.
- rule_id: snow_forecast_procedure
  section_no: 16
  category: snow_guidance
  rule_type: reference
  title: 적설 예보 절차
  source_ref: hands_37.pdf p.126-129
  applicable_domains:
  - snow_forecast
  feature_mapping_status: not_mapped_yet
  trigger_conditions:
    any_of:
    - - snow_forecast:precip_expected
  interpretation: 적설 예보는 강수형태 판단, 적설 가능 여부 판단, 수상당량비 계산 순으로 진행해야 한다.
  forecast_use: 강수량만으로 적설량을 계산하지 않는다.
- rule_id: lowlevel_thickness_precip_type
  section_no: 16
  category: snow_guidance
  rule_type: reference
  title: 저층 층후를 이용한 강수형태 판별
  source_ref: hands_37.pdf p.126-139
  applicable_domains:
  - snow_forecast
  feature_mapping_status: not_mapped_yet
  trigger_conditions:
    any_of:
    - - snow_forecast:thickness_1000_850
    - - snow_forecast:thickness_1000_700
  interpretation: 국내 사례에서는 저층 층후가 눈·비·진눈깨비 판별에 실무적으로 중요하다.
  forecast_use: 1000-700hPa 층후 단독 사용을 경계한다.
- rule_id: snowfall_track_type_assessment
  section_no: 17
  category: snow_cases
  rule_type: reference
  title: 저기압 경로 유형에 따른 대설 사례 분류
  source_ref: hands_37.pdf p.140-151
  applicable_domains:
  - snow_forecast
  - surface
  feature_mapping_status: not_mapped_yet
  trigger_conditions:
    any_of:
    - - surface:low_track_type
  interpretation: 대설 사례는 지상저기압 이동 경로 유형으로 나누어 해석할 수 있으며, 유형별 반복 패턴이 존재한다.
  forecast_use: 지역 대설 가능성을 선별할 때 과거 경로 유형과 유사성 여부를 점검한다.
- rule_id: ice_nuclei_temperature_window
  section_no: 18
  category: snow_microphysics
  rule_type: reference
  title: 빙정핵 종류별 활성 온도 구간
  source_ref: hands_37.pdf p.152-155
  applicable_domains:
  - snow_microphysics
  feature_mapping_status: not_mapped_yet
  trigger_conditions:
    any_of:
    - - snow_microphysics:ice_nuclei_type
  interpretation: 빙정핵 종류에 따라 활발히 성장하는 온도 구간이 달라 눈 결정 형성과 수상당량비에 영향을 줄 수 있다.
  forecast_use: 미세물리 해석은 눈 예보 보조 정보로 사용한다.
- rule_id: blocking_persistence_definition
  section_no: 19
  category: climate_pattern
  rule_type: reference
  title: 500hPa 블로킹 정의와 지속 조건
  source_ref: hands_37.pdf p.156-165
  applicable_domains:
  - 500hPa
  - climate_pattern
  feature_mapping_status: not_mapped_yet
  trigger_conditions:
    any_of:
    - - 500hPa:blocking_pattern
  interpretation: 500hPa에서 남북류 강화와 고저기압 정체 패턴이 5일 이상 지속되면 블로킹으로 볼 수 있다.
  forecast_use: 특정 일기시스템 장기 정체 가능성의 배경장으로 활용한다.
- rule_id: mjo_tropical_convection_link
  section_no: 20
  category: climate_pattern
  rule_type: reference
  title: MJO와 동아시아 강수 배경장 연계
  source_ref: hands_37.pdf p.166-177
  applicable_domains:
  - climate_pattern
  - tropical_convection
  feature_mapping_status: not_mapped_yet
  trigger_conditions:
    any_of:
    - - tropical_convection:mjo_active_phase
  interpretation: MJO는 인도양에서 발달한 열대 대류성 구름대가 동진하는 변동으로, 동아시아 여름철 강수 배경장과 연동될 수 있다.
  forecast_use: 주간 이후 배경 설명용으로 사용하며 단기 종관 판정과는 분리한다.
- rule_id: dust_source_detection
  section_no: 21
  category: dust_guidance
  rule_type: reference
  title: 황사 발원 여부 기본 판단
  source_ref: hands_37.pdf p.178-185
  applicable_domains:
  - dust
  - 850hPa
  - satellite
  feature_mapping_status: not_mapped_yet
  trigger_conditions:
    any_of:
    - - dust:pm10_high
      - satellite:dust_detected
  interpretation: 황사 발원 판단은 위성, PM10, 적설 여부, 850hPa 기온을 함께 봐야 한다.
  forecast_use: 발원지 적설과 지면 상태를 확인하지 않으면 오탐 위험이 있다.
- rule_id: dust_forecast_checklist
  section_no: 22
  category: dust_cases
  rule_type: reference
  title: 황사 예보 필수 점검 요소
  source_ref: hands_37.pdf p.186-199
  applicable_domains:
  - dust
  - 850hPa
  - 700hPa
  - satellite
  feature_mapping_status: not_mapped_yet
  trigger_conditions:
    any_of:
    - - dust:source_region_check
  interpretation: 황사 발원은 snow cover, 850hPa 온도, warm ridge, 실제 황사 관측, 모델 예측의 동시 확인이 필요하다.
  forecast_use: 야간 적외 황사영상은 과소 탐지 가능성을 고려한다.
- rule_id: hail_cold_core_shear
  section_no: 23
  category: hail
  rule_type: reference
  title: 우박은 중상층 한기와 시어가 핵심
  source_ref: hands_37.pdf p.200-209
  applicable_domains:
  - 500hPa
  - 300hPa
  - surface
  - hail
  feature_mapping_status: not_mapped_yet
  trigger_conditions:
    any_of:
    - - 500hPa:cold_core
      - 300hPa:vertical_shear_strong
    - - 500hPa:cutoff_low
      - surface:convective_precip
  interpretation: 우박은 하층 고온보다 중상층 찬 공기와 강한 연직시어, 포화층 구조가 중요하다.
  forecast_use: 우박 가능성 판단 시 KI·SSI보다 중상층 구조를 우선 본다.
- rule_id: explosive_cyclone_risk
  section_no: 24
  category: explosive_cyclone
  rule_type: operational
  title: 급격히 발달하는 저기압과 강풍·불안정
  source_ref: hands_37.pdf p.210-217
  applicable_domains:
  - 300hPa
  - 500hPa
  - surface
  - sfc12h_synoptic
  - satellite_wv
  feature_mapping_status: mapped
  trigger_conditions:
    any_of:
    - - 500hPa:cold_core
      - surface:low_center
      - surface:strong_wind_zone
    - - 500hPa:closed_cyclonic_circulation
      - sfc12h_synoptic:synoptic_low_center
      - sfc12h_synoptic:gale_wind_area
  interpretation: 급격히 발달하는 저기압은 강한 기압경도력, 강풍, 해상 너울, 소낙성 강수, 황사 낙하를 동반할 수 있다.
  forecast_use: 동해상 급발달 저기압은 저기압 중심이 멀어도 우리나라 영향이 클 수 있다.
- rule_id: freezing_rain_blackice_risk
  section_no: 25
  category: winter_hazards
  rule_type: reference
  title: 어는 비와 블랙아이스 위험
  source_ref: hands_37.pdf p.218-225
  applicable_domains:
  - winter_hazards
  - surface
  - thermodynamic_profile
  feature_mapping_status: not_mapped_yet
  trigger_conditions:
    any_of:
    - - surface:subfreezing_surface
      - surface:liquid_precip
  interpretation: 중상층에서 눈이 형성된 뒤 하층 영상층을 거쳐 비로 내리고, 지표가 영하이면 어는 비와 블랙아이스가 발생할 수 있다.
  forecast_use: 강수량보다 지표와 물체 표면의 냉각 환경을 함께 본다.
- rule_id: tornadic_supercell_structure
  section_no: 26
  category: tornado
  rule_type: reference
  title: 거대세포뇌우 내부 용오름 구조
  source_ref: hands_37.pdf p.226-236
  applicable_domains:
  - tornado
  - surface
  - satellite
  - radar
  feature_mapping_status: not_mapped_yet
  trigger_conditions:
    any_of:
    - - surface:warm_moist_inflow
      - surface:rear_flank_dry_intrusion
    - - radar:supercell_signature
  interpretation: 용오름은 거대세포뇌우 내부에서 따뜻하고 습한 유입과 후면의 한랭건조 침강이 공존하는 구조와 연결된다.
  forecast_use: 호우 구역과 용오름 위치가 동일하지 않으므로 전후면 구조를 분리해 해석한다.
usage_notes:
- section 단위 요약은 PDF 전 장을 빠짐없이 추적하기 위한 기본 층이다.
- rules는 현재 feature 체계와 연결 가능한 operational 규칙과 향후 확장용 reference 규칙을 함께 담는다.
- operational 규칙도 evidence_pack과 함께 사용할 때만 유효하다.
- feature_mapping_status가 not_mapped_yet인 rule은 현재 자동화 파이프라인에서 직접 실행하지 않고 참고 규칙으로 취급한다.

  - 각 section에는 핵심 요약, 운영 해석 포인트, 연결 rule_id를 포함했다.
  - rules에는 현재 feature 체계와 직접 연결 가능한 운영 규칙과, 향후 확장을 위한 참고 규칙을 함께 포함했다.

version: 1
allow_new_claims: false
fail_fast: true
auto_recovery: false
allow_partial_output: false
hard_fail_issue_types:
  - schema_invalid
  - missing_source_card_ids
  - missing_evidence_refs
  - unsupported_claim
  - contradiction
  - allow_new_claims_violation
  - missing_section
required_sections:
  - overall_summary
  - synoptic_overview
  - surface_overview
duplicate_similarity_threshold: 0.72
contradiction_pairs:
  - ["강화", "약화"]
  - ["확대", "축소"]
  - ["발달", "쇠퇴"]
  - ["북상", "남하"]
  - ["동진", "서진"]
  - ["유지", "소멸"]

  title: 손에 잡히는 예보필수요소의 활용법과 정의
  published_at: 2014-10
  total_pages: 236
  usage_policy:
    direct_evidence_source: false
    interpretation_reference_only: true
    notes:
    - 현재 상황의 직접 증거로 사용하지 않는다.
    - 관측 기반 feature를 해석하는 참고 규칙집으로만 사용한다.
    - rule만으로 현재 상황을 단정하지 않고, 반드시 evidence_pack과 함께 사용한다.
coverage_status:
